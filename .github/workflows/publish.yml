name: Publish VS Code Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    name: Package and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check bundled renderer
        run: npm run check:renderer

      - name: Package VSIX
        run: npm run package -- --out xaligo-vscode-extension.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: xaligo-vscode-extension
          path: xaligo-vscode-extension.vsix
          if-no-files-found: error

      - name: Check Marketplace token
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT repository secret is required."
            exit 1
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish --packagePath xaligo-vscode-extension.vsix -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
