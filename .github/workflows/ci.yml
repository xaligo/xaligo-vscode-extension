name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Typecheck and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npm run package -- --out xaligo-vscode-extension.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: xaligo-vscode-extension
          path: xaligo-vscode-extension.vsix
          if-no-files-found: error
